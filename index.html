<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moody — Jurnal Suasana Hati Kawaii</title>
  <!-- Google Fonts: Fredoka (Headings), Patrick Hand (Handwritten Notes), Outfit (Interface UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Patrick+Hand&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Dotted Canvas Grid -->
  <div class="scrapbook-canvas">
    
    <!-- Top Ribbon Header -->
    <header class="scrapbook-header">
      <div class="header-logo">
        <h1 class="marker-title">Moody 🧸</h1>
      </div>
      <div class="header-tagline">
        <span class="washi-tape-accent">Jurnal Harian Saya</span>
      </div>
    </header>

    <!-- Folder Nav Tabs (Folder Dividers style) -->
    <nav class="folder-tabs">
      <button class="tab-divider active" data-target="panel-editor" id="tab-nav-editor">
        <span class="tab-label">✍️ Tulis Jurnal</span>
      </button>
      <button class="tab-divider" data-target="panel-history" id="tab-nav-history">
        <span class="tab-label">📖 Buku Harian</span>
      </button>
      <button class="tab-divider" data-target="panel-analytics" id="tab-nav-analytics">
        <span class="tab-label">📊 Tren & Statistik</span>
      </button>
    </nav>

    <!-- Main Scrapbook Page Board -->
    <main class="scrapbook-board">
      
      <!-- Panel 1: Jurnal Baru (Editor) -->
      <section id="panel-editor" class="panel-section active">
        <div class="journal-paper">
          <div class="washi-tape washi-pink washi-top-left"></div>
          
          <h2 class="handwritten-title">Catatan Hari Ini ✨</h2>
          
          <form id="journal-form" class="editor-form" onsubmit="return false;">
            <!-- Title Input -->
            <div class="form-group">
              <label for="journal-title" class="handwritten-label">Judul (Opsional):</label>
              <input type="text" id="journal-title" class="scrapbook-input" placeholder="Tulis judul hari ini...">
            </div>

            <!-- Mood Picker -->
            <div class="form-group">
              <label class="handwritten-label">Bagaimana perasaanmu?</label>
              <div class="mood-selector">
                <button type="button" class="mood-sticker-btn" data-mood="awesome" title="Luar Biasa">
                  <span class="mood-emoji">🥰</span>
                  <span class="mood-text">Awesome</span>
                </button>
                <button type="button" class="mood-sticker-btn" data-mood="good" title="Baik">
                  <span class="mood-emoji">🙂</span>
                  <span class="mood-text">Good</span>
                </button>
                <button type="button" class="mood-sticker-btn active" data-mood="neutral" title="Biasa Saja">
                  <span class="mood-emoji">😐</span>
                  <span class="mood-text">Neutral</span>
                </button>
                <button type="button" class="mood-sticker-btn" data-mood="bad" title="Buruk">
                  <span class="mood-emoji">🙁</span>
                  <span class="mood-text">Bad</span>
                </button>
                <button type="button" class="mood-sticker-btn" data-mood="awful" title="Sangat Buruk">
                  <span class="mood-emoji">😭</span>
                  <span class="mood-text">Awful</span>
                </button>
              </div>
            </div>

            <!-- Content Body Editor -->
            <div class="form-group flex-fill">
              <label for="journal-content" class="handwritten-label">Tulis Catatanmu:</label>
              <textarea id="journal-content" class="scrapbook-textarea" placeholder="Tumpahkan perasaanmu di sini..."></textarea>
            </div>

            <!-- Tag Input -->
            <div class="form-group">
              <label for="tag-input" class="handwritten-label">Tambah Tag:</label>
              <div class="tag-input-container">
                <input type="text" id="tag-input" class="scrapbook-input" placeholder="Ketik tag lalu tekan Enter atau klik +">
                <button type="button" id="btn-add-tag" class="sticker-btn-small">+</button>
              </div>
              <!-- Added Tag List -->
              <div id="editor-tag-list" class="tag-pills-container">
                <!-- Tag pills rendered dynamically -->
              </div>
            </div>

            <!-- Save Button -->
            <div class="form-actions">
              <button type="submit" id="btn-save-journal" class="sticker-submit-btn">Simpan Jurnal 💾</button>
            </div>
          </form>
        </div>
      </section>

      <!-- Panel 2: Riwayat Jurnal (History) -->
      <section id="panel-history" class="panel-section">
        <div class="journal-paper">
          <div class="washi-tape washi-yellow washi-top-right"></div>
          <h2 class="handwritten-title">Kenangan Masa Lalu 📖</h2>
          <!-- Entries Container -->
          <div id="journal-entries-container" class="entries-masonry">
            <!-- Entries rendered as cute polaroid cards dynamically -->
          </div>
        </div>
      </section>

      <!-- Panel 3: Analisis Mood (Analytics) -->
      <section id="panel-analytics" class="panel-section">
        <div class="journal-paper">
          <div class="washi-tape washi-blue washi-top-left"></div>
          <h2 class="handwritten-title">Papan Analisis 📊</h2>
          <div class="placeholder-content" style="text-align: center; padding: 40px; color: #64748b; font-family: 'Patrick Hand', cursive; font-size: 1.3rem;">
            Dashboard Statistik dan Grafik SVG akan dibuat pada Issue #6 & #7.
          </div>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
